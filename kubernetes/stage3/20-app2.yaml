apiVersion: v1
kind: ServiceAccount
metadata:
  name: app2-sa
  namespace: app2
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app2-content
  namespace: app2
data:
  index.html: |
    <!doctype html>
    <html>
      <head><title>app2</title></head>
      <body>
        <h1>Hello from app2</h1>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app2-nginx
  namespace: app2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app2-nginx
  template:
    metadata:
      labels:
        app: app2-nginx
    spec:
      serviceAccountName: app2-sa
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: web-content
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: web-content
          configMap:
            name: app2-content
---
apiVersion: v1
kind: Service
metadata:
  name: app2-svc
  namespace: app2
spec:
  selector:
    app: app2-nginx
  ports:
    - port: 80
      targetPort: 80